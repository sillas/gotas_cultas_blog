server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 8m;
  # Directory redirects must stay relative. An absolute redirect generated
  # inside the container would use port 80 and make the browser lose :8080.
  absolute_redirect off;

  location /api/ {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /images/ {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
  }

  location /admin/ {
    try_files $uri $uri/ /admin/index.html;
  }

  location / {
    # Resolve Astro's clean routes directly to <route>/index.html. Checking
    # directories first makes Nginx emit a cacheable 301 to add a slash;
    # older versions generated that redirect without the host port.
    try_files $uri/index.html $uri /404.html;
  }
}
