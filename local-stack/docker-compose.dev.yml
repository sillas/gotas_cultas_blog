services:
  dynamodb:
    image: amazon/dynamodb-local:3.0.0@sha256:2fed5e3a965a4ba5aa6ac82baec57058b5a3848e959d705518f3fd579a77e76b
    user: root
    command: -jar DynamoDBLocal.jar -sharedDb -dbPath /data
    working_dir: /home/dynamodblocal
    volumes:
      - dynamodb-data:/data

  api:
    build:
      context: ..
      dockerfile: local-stack/Dockerfile
    command: node local-stack/src/server.mjs
    environment:
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      TABLE_NAME: BlogLocal
      LOCAL_ADMIN_TOKEN: local-dev-token
      IMAGES_DIR: /data/images
      SEED_LOCAL_DATA: "true"
    depends_on:
      - dynamodb
    volumes:
      - images-data:/data/images

  content-sync:
    build:
      context: ..
      dockerfile: local-stack/Dockerfile
    command: node local-stack/src/content-sync.mjs
    environment:
      DYNAMODB_ENDPOINT: http://dynamodb:8000
      TABLE_NAME: BlogLocal
    depends_on:
      - api
    volumes:
      - ../site/src:/app/site/src
      - ./src:/app/local-stack/src

  site-dev:
    build:
      context: ..
      dockerfile: local-stack/Dockerfile
    command: sh -c 'until [ -f site/src/content/posts/.dev-ready ]; do sleep 1; done; rm -f site/.astro/dev.json; npm run dev -w site -- --host 0.0.0.0 --port 4321'
    environment:
      SITE_URL: http://localhost:8080
      PUBLIC_API_BASE_URL: /api
      ASTRO_TELEMETRY_DISABLED: "1"
    depends_on:
      - content-sync
    volumes:
      - ../site/src:/app/site/src
      - ../site/public:/app/site/public

  admin-dev:
    build:
      context: ..
      dockerfile: local-stack/Dockerfile
    command: npm run dev -w admin -- --host 0.0.0.0 --port 5173
    environment:
      VITE_AUTH_MODE: local
      VITE_API_BASE_URL: /api
    depends_on:
      - api
    volumes:
      - ../admin/src:/app/admin/src
      - ../admin/index.html:/app/admin/index.html

  web-dev:
    image: nginx:1.29.8-alpine3.23@sha256:5616878291a2eed594aee8db4dade5878cf7edcb475e59193904b198d9b830de
    depends_on:
      - api
      - site-dev
      - admin-dev
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  dynamodb-data:
  images-data:
