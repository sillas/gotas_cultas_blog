name: Deploy infra (CDK)

# Manual only — infra changes are infrequent and shouldn't redeploy on every
# push the way the site/admin workflow does (PROJECT_SPEC.md section 13.6).
on:
  workflow_dispatch:
    inputs:
      stage:
        description: AWS environment to deploy
        required: true
        type: choice
        options: [homolog, production]

permissions:
  id-token: write # OIDC — PROJECT_SPEC.md section 13.2
  contents: read

concurrency:
  group: deploy-infra-${{ inputs.stage }}
  cancel-in-progress: false

jobs:
  cdk-deploy:
    environment: ${{ inputs.stage }}
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      STAGE: ${{ inputs.stage }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Validate stage and branch
        shell: bash
        run: |
          expected_branch="main"
          if [[ "${STAGE}" == "homolog" ]]; then expected_branch="homolog"; fi
          [[ "${GITHUB_REF_NAME}" == "${expected_branch}" ]] || {
            echo "Stage ${STAGE} must be deployed from ${expected_branch}." >&2
            exit 1
          }

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS account against versioned source
        id: account
        shell: bash
        run: |
          expected="$(node scripts/expected-account.mjs "${STAGE}")"
          actual="$(aws sts get-caller-identity --query Account --output text)"
          [[ "${actual}" == "${expected}" ]] || exit 1
          echo "account=${expected}" >> "${GITHUB_OUTPUT}"

      - name: Build shared package (bundled into every Lambda by esbuild)
        run: npm run build:shared

      # Once the domain is registered in Route 53 (PROJECT_SPEC.md section
      # 13.6), add: -c domainName=... -c hostedZoneId=... -c hostedZoneName=...
      - name: cdk deploy --all
        run: >
          npx cdk deploy --all --require-approval never
          -c stage=${STAGE}
          -c githubRepo=${{ github.repository }}
          -c cognitoDomainPrefix=${{ vars.COGNITO_DOMAIN_PREFIX }}
          -c domainName=${{ vars.DOMAIN_NAME }}
          -c hostedZoneId=${{ vars.HOSTED_ZONE_ID }}
          -c hostedZoneName=${{ vars.HOSTED_ZONE_NAME }}
          -c siteUrl=${{ vars.SITE_URL }}
          -c alarmEmail=${{ vars.ALARM_EMAIL }}
          -c monthlyBudgetUsd=${{ vars.MONTHLY_BUDGET_USD }}
        working-directory: infra
        env:
          CDK_DEFAULT_ACCOUNT: ${{ steps.account.outputs.account }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
