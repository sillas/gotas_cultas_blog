name: CI

# Runs on every PR/push — no AWS credentials involved, so it's safe to run
# automatically. This is the "build must succeed before it goes live" gate
# from PROJECT_SPEC.md section 13.7.
on:
  pull_request:
    branches: [production, homolog]
  push:
    branches: [main, production, homolog]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Typecheck Lambdas
        run: npm run typecheck:lambdas

      # No BLOG_TABLE_NAME here on purpose — export-content.ts skips the
      # DynamoDB read and builds with whatever is already checked out
      # (nothing, since content is gitignored), just to prove the build itself
      # doesn't crash on empty content.
      - name: Build public site
        run: npm run build:site

      # Core Web Vitals baseline, captured before AdSense is ever enabled
      # (ADSENSE_READINESS_AND_RECOMMENDATIONS.md #8). Advisory only: no
      # assertions configured, and continue-on-error keeps a flaky
      # Lighthouse/Chrome run from blocking the build.
      - name: Lighthouse CI (Core Web Vitals baseline)
        run: npx --yes @lhci/cli@0.15.1 autorun --config=./lighthouserc.cjs
        continue-on-error: true

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        continue-on-error: true
        with:
          name: lighthouse-ci-report
          path: lighthouse-ci-report
          retention-days: 30

      - name: Build admin SPA
        run: npm run build:admin

      - name: Typecheck infra (CDK)
        run: npm run build:infra

      - name: Unit tests
        run: npm test

      - name: CDK synth
        run: npm run synth
